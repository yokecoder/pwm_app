
<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <title>Saved PassWords</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
       
    </head>
    <body>
        <a href="/">Back To HomePage</a>
        <br>
        <br>
        <form action="/del_all_" method="POST" accept-charset="utf-8">
            <input type="submit" name="sub" id="sub" value="DELETE ALL PassWords" />
        </form>
        <br>
        <table border="1">
           <tr>
               <th> KEY </th>
               <th> Passwords </th>
               <th> ACTIONS </th>
              
           </tr>
           {% for key,passw in pwm_dict.items() %}
           <tr>
               <td> {{key}}</td>
               <td> {{passw}} </td>
               <td> <a href="/update/{{key}}">UPDATE</a> <br /> <a href="/del/{{key}}">DELETE</a></td>
               
               
           </tr>
           {% endfor %}
           
           
           
       </table>

       
       
       
    </body>
</html>
